# Set catppuccin theme
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_current_number_color "#{@thm_peach}"
set -g @catppuccin_window_status_style "basic"
# set -g @catppuccin_status_background "default"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_current_left_separator " "
set -g @catppuccin_window_current_middle_separator " "
set -g @catppuccin_window_current_right_separator " "

# remove background color on window
# set -g @catppuccin_window_number_color "none"
# set -g @catppuccin_window_text_color "none"

# set -g @catppuccin_status_background "#242638" 
set -g @catppuccin_window_current_text "#[bold] #{b:pane_current_path}"
set -g @catppuccin_window_text "#[dim] #{pane_current_command} - #{b:pane_current_path}"
# set -g @catppuccin_pane_left_separator "█"
# set -g @catppuccin_pane_middle_separator "█"
# set -g @catppuccin_pane_right_separator "█"

# run "~/.config/tmux/plugins/tmux/catppuccin.tmux"
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
